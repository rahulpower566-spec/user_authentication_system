<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        .navbar {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        .container {
            width: 350px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #2c3e50;
        }

        a {
            display: block;
            text-decoration: none;
            background: #3498db;
            color: white;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            font-weight: bold;
        }

        a:hover {
            background: #1d6fa5;
        }

        .logout {
            background: #e74c3c;
        }

        .logout:hover {
            background: #c0392b;
        }
    </style>
</head>

<body>

<div class="navbar">
    🎓 Student Management System
</div>

<div class="container">

    <h2>Welcome {{ session['user'] }} 👋</h2>

    <a href="/add">➕ Add Student</a>
    <a href="/students">📋 View Students</a>
    <a class="logout" href="/logout">🚪 Logout</a>

</div>

</body>
</html>
